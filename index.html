    <script>
        window.addEventListener('error', function(e) {
            var errDiv = document.createElement('div');
            errDiv.style.cssText = 'background:#fee2e2;color:#b91c1c;padding:16px;font-family:monospace;position:fixed;top:0;left:0;right:0;z-index:99999;border-bottom:2px solid #ef4444;';
            errDiv.innerHTML = '<strong>Error crítico:</strong> ' + e.message + '<br/>Línea: ' + e.lineno;
            document.body.appendChild(errDiv);
        });
        window.addEventListener('unhandledrejection', function(e) {
            var errDiv = document.createElement('div');
            errDiv.style.cssText = 'background:#fee2e2;color:#b91c1c;padding:16px;font-family:monospace;position:fixed;top:0;left:0;right:0;z-index:99999;border-bottom:2px solid #ef4444;';
            errDiv.innerHTML = '<strong>Promesa rechazada:</strong> ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
            document.body.appendChild(errDiv);
        });
    </script>

<body class="selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;
        const Recharts = window.Recharts || {};
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend } = Recharts;

        const WEBHOOK_URL = 'https://n8n.tecleti.com/webhook/d437bbf9-059a-4763-8f87-2d02c8da4a33';

        const parseNumber = (val) => {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            return parseFloat(val.toString().replace(/\./g, '').replace(/,/g, '.')) || 0;
        };

        const formatCurrency = (val) => {
            return new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: 'USD', 
                minimumFractionDigits: 0,
                maximumFractionDigits: 0,
            }).format(val || 0).replace('US$', '$'); 
        };

        const formatPercentage = (val) => {
            try {
                if (val === undefined || val === null || val === '') return '';
                if (typeof val === 'string' && val.indexOf('%') !== -1) return val;
                let num = typeof val === 'number' ? val : parseFloat(val.toString().replace(/\./g, '').replace(/,/g, '.'));
                if (isNaN(num)) return String(val);
                return new Intl.NumberFormat('es-AR', {
                    style: 'percent',
                    minimumFractionDigits: 1,
                    maximumFractionDigits: 1
                }).format(num);
            } catch (err) {
                console.error('Error formatting percentage:', err);
                return String(val);
            }
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return <div className="p-10 text-red-500 font-mono text-sm whitespace-pre-wrap bg-red-500/10 h-screen">Error de Renderizado: {this.state.error ? this.state.error.toString() : 'Fallo desconocido'}</div>;
                }
                return this.props.children; 
            }
        }

        const Icon = ({ name, className }) => {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    if (window.lucide) {
                        window.lucide.createIcons({ root: spanRef.current });
                    }
                }
            }, [name, className]);
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        function App() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('portfolio'); // 'portfolio', 'activity', 'expenses'

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(WEBHOOK_URL);
                    const json = await res.json();
                    
                    const flatData = Array.isArray(json) 
                        ? json.flat(Infinity)
                        : (json.data ? json.data.flat(Infinity) : []);
                    
                    setData(flatData);
                } catch (err) {
                    console.error('Error fetching data:', err);
                }
                setLoading(false);
            };

            if (loading) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen pb-20">
                        <Icon name="loader-2" className="w-8 h-8 text-blue-500 animate-spin mb-4" />
                        <p className="text-sm text-slate-400 font-medium">Sincronizando datos...</p>
                    </div>
                );
            }

            const rawGastos = data?.filter(d => d.Categoria === 'Gastos') || [];
            const rawResumen = data?.filter(d => d.Categoria === 'Resumen') || [];
            const rawPortafolio = data?.filter(d => d.Categoria === 'Portafolio Abierto') || [];
            const rawCerradas = data?.filter(d => d.Categoria === 'Cerradas') || [];
            const rawOperaciones = data?.filter(d => d.Categoria === 'Operaciones') || [];

            const gastos = rawGastos.filter(d => d.Gasto !== "" && d.Descripción !== "Descripción" && d.Gasto !== "Gasto");
            const resumen = rawResumen.filter(d => d.col_2 !== "Todo lo que gastaste comprando activos" && typeof d.col_2 === 'number');
            const portafolio = rawPortafolio.filter(d => d["PORTFOLIO ABIERTO"] !== "Ticker" && d.col_2 !== "Tipo" && d["PORTFOLIO ABIERTO"]);
            const cerradas = rawCerradas.filter(d => d["OPERACIONES CERRADAS"] !== "Fecha Venta" && d.col_2 !== "Ticker" && d["OPERACIONES CERRADAS"]);
            const operaciones = rawOperaciones.filter(d => d["OPERACIONES"] !== "Fecha" && d.col_2 !== "Tipo" && d["OPERACIONES"]);

            let valInvertido = 0, valActual = 0, valGananciaSiVendes = 0, valGananciaNeta = 0, valComisiones = 0;
            resumen.forEach(r => {
                const key = r["RESUMEN DEL PORTFOLIO"];
                const val = parseNumber(r.col_2);
                if (key === "Total invertido") valInvertido = val;
                if (key === "Valor actual del portfolio") valActual = val;
                if (key === "Ganancia si vendieras hoy") valGananciaSiVendes = val;
                if (key === "Ganancia neta realizada") valGananciaNeta = val;
                if (key === "Total comisiones pagadas") valComisiones = val;
            });

            const gastosChartData = (() => {
                const map = {};
                gastos.forEach(g => {
                    const cat = g.CategoriaGasto || g.Subcategoria || 'Otro';
                    map[cat] = (map[cat] || 0) + parseNumber(g.Gasto);
                });
                return Object.keys(map).map(key => ({ name: key, value: map[key] })).sort((a,b)=>b.value-a.value);
            })();

            const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];

            return (
                <div className="min-h-screen flex flex-col items-center pb-24">
                    
                    {/* Header Strip */}
                    <header className="w-full bg-[#0a1120] border-b border-white/[0.06] sticky top-0 z-40 backdrop-blur-md">
                        <div className="max-w-[1240px] w-full mx-auto px-6 sm:px-8">
                            <div className="py-5 flex items-center justify-between">
                                <div className="flex items-center space-x-3">
                                    <h1 className="text-lg font-semibold text-slate-100 tracking-tight">Finanzas Personales</h1>
                                </div>
                            </div>
                            
                            {/* Navigation */}
                            <nav className="flex space-x-8 mt-1">
                                <button
                                    onClick={() => setActiveTab('portfolio')}
                                    className={`nav-tab pb-4 text-sm font-medium flex items-center ${activeTab === 'portfolio' ? 'active' : ''}`}
                                >
                                    Resumen y Portafolio
                                </button>
                                <button
                                    onClick={() => setActiveTab('activity')}
                                    className={`nav-tab pb-4 text-sm font-medium flex items-center ${activeTab === 'activity' ? 'active' : ''}`}
                                >
                                    Operaciones Históricas
                                </button>
                                <button
                                    onClick={() => setActiveTab('expenses')}
                                    className={`nav-tab pb-4 text-sm font-medium flex items-center ${activeTab === 'expenses' ? 'active' : ''}`}
                                >
                                    Gastos y Consumos
                                </button>
                            </nav>
                        </div>
                    </header>

                    <main className="w-full max-w-[1240px] mx-auto px-6 sm:px-8 mt-10 space-y-8">
                        
                        {/* ===================== TAB: PORTFOLIO ===================== */}
                        {activeTab === 'portfolio' && (
                            <div className="space-y-8 animate-fade-in">
                                
                                {/* Top KPI Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    
                                    <div className="saas-card p-5 flex flex-col">
                                        <h3 className="text-slate-400 text-sm font-medium mb-1">Capital Invertido</h3>
                                        <div className="flex items-baseline space-x-2 mt-1">
                                            <span className="text-2xl font-semibold text-slate-100 number-font">{formatCurrency(valInvertido)}</span>
                                        </div>
                                    </div>

                                    <div className="saas-card p-5 flex flex-col">
                                        <h3 className="text-slate-400 text-sm font-medium mb-1">Valor Actual</h3>
                                        <div className="flex items-baseline space-x-2 mt-1">
                                            <span className={`text-2xl font-semibold number-font ${valActual >= valInvertido ? 'text-slate-100' : 'text-slate-300'}`}>
                                                {formatCurrency(valActual)}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="saas-card p-5 flex flex-col">
                                        <h3 className="text-slate-400 text-sm font-medium mb-1">PyL vendiendo hoy</h3>
                                        <div className="flex items-baseline space-x-2 mt-1">
                                            <span className={`text-2xl font-semibold number-font ${valGananciaSiVendes >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                                                {valGananciaSiVendes >= 0 ? '+' : ''}{formatCurrency(valGananciaSiVendes)}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="saas-card p-5 flex flex-col">
                                        <h3 className="text-slate-400 text-sm font-medium mb-1">Ganancia Realizada</h3>
                                        <div className="flex items-baseline space-x-2 mt-1">
                                            <span className={`text-2xl font-semibold number-font ${valGananciaNeta >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                                                {valGananciaNeta >= 0 ? '+' : ''}{formatCurrency(valGananciaNeta)}
                                            </span>
                                        </div>
                                        <p className="text-xs text-slate-500 mt-2">Comisiones: {formatCurrency(valComisiones)}</p>
                                    </div>
                                    
                                </div>

                                {/* Open Positions Table */}
                                <div className="saas-card overflow-hidden">
                                    <div className="px-6 py-5 border-b border-white/[0.04] flex items-center justify-between">
                                        <h2 className="text-base font-semibold text-slate-100">Posiciones Abiertas</h2>
                                        <span className="text-xs font-medium bg-slate-800 text-slate-300 px-2 py-1 rounded">{portafolio.length} Activos</span>
                                    </div>
                                    
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left whitespace-nowrap">
                                            <thead className="bg-[#0b1220] border-b border-white/[0.04]">
                                                <tr>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Activo</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Cantidad</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Precio Promedio</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Precio Actual</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">P/L $</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Rend. %</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/[0.02]">
                                                {portafolio.map((p, i) => {
                                                    const ganancia = parseNumber(p.col_7);
                                                    const isPositive = ganancia >= 0;
                                                    return (
                                                        <tr key={i} className="text-sm table-row-hover">
                                                            <td className="px-6 py-3.5">
                                                                <div className="flex items-center">
                                                                    <span className="font-semibold text-slate-200">{p["PORTFOLIO ABIERTO"]}</span>
                                                                    <span className="ml-2 text-xs text-slate-500">{p.col_2}</span>
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-3.5 text-right text-slate-300 number-font">{p.col_3}</td>
                                                            <td className="px-6 py-3.5 text-right text-slate-400 number-font">{p.col_4}</td>
                                                            <td className="px-6 py-3.5 text-right text-slate-200 number-font font-medium">{p.col_5}</td>
                                                            <td className={`px-6 py-3.5 text-right font-medium number-font ${isPositive ? 'text-emerald-500' : 'text-red-500'}`}>
                                                                {isPositive ? '+' : ''}{formatCurrency(ganancia)}
                                                            </td>
                                                            <td className="px-6 py-3.5 text-right">
                                                                <span className={`inline-flex px-2 py-0.5 rounded text-xs font-medium ${isPositive ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}`}>
                                                                    {formatPercentage(p.col_8)}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                                {portafolio.length === 0 && (
                                                    <tr><td colSpan="6" className="px-6 py-6 text-center text-slate-500 text-sm">Sin posiciones abiertas.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ===================== TAB: HISTORY ===================== */}
                        {activeTab === 'activity' && (
                            <div className="space-y-8 animate-fade-in">
                                
                                <div className="saas-card overflow-hidden">
                                    <div className="px-6 py-5 border-b border-white/[0.04]">
                                        <h2 className="text-base font-semibold text-slate-100">Ventas Cerradas</h2>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left whitespace-nowrap">
                                            <thead className="bg-[#0b1220] border-b border-white/[0.04]">
                                                <tr>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Fecha</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Activo</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Cant.</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">P. Venta</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Comisión</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Ganancia Neta</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/[0.02]">
                                                {cerradas.map((c, i) => {
                                                    const neta = parseNumber(c.col_9);
                                                    const isPositive = neta >= 0;
                                                    return (
                                                        <tr key={i} className="text-sm table-row-hover">
                                                            <td className="px-6 py-3.5 text-slate-400 text-xs">{c["OPERACIONES CERRADAS"]}</td>
                                                            <td className="px-6 py-3.5">
                                                                <span className="font-semibold text-slate-200">{c.col_2}</span>
                                                                <span className="ml-2 text-xs text-slate-500">{c.col_3}</span>
                                                            </td>
                                                            <td className="px-6 py-3.5 text-right text-slate-300 number-font">{c.col_4}</td>
                                                            <td className="px-6 py-3.5 text-right text-slate-300 number-font">{c.col_5}</td>
                                                            <td className="px-6 py-3.5 text-right text-slate-500 number-font">{c.col_8}</td>
                                                            <td className={`px-6 py-3.5 text-right font-medium number-font ${isPositive ? 'text-emerald-500' : 'text-red-500'}`}>
                                                                {isPositive ? '+' : ''}{formatCurrency(neta)}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                                {cerradas.length === 0 && (
                                                    <tr><td colSpan="6" className="px-6 py-6 text-center text-slate-500 text-sm">No hay registro de ventas.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="saas-card overflow-hidden">
                                    <div className="px-6 py-5 border-b border-white/[0.04]">
                                        <h2 className="text-base font-semibold text-slate-100">Registro de Transacciones</h2>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left whitespace-nowrap">
                                            <thead className="bg-[#0b1220] border-b border-white/[0.04]">
                                                <tr>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Fecha</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Tipo</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Activo</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Cant.</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Precio</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Total</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/[0.02]">
                                                {operaciones.map((op, i) => {
                                                    const isCompra = op.col_4?.toLowerCase() === 'compra';
                                                    return (
                                                        <tr key={i} className="text-sm table-row-hover">
                                                            <td className="px-6 py-3.5 text-slate-400 text-xs">{op["OPERACIONES"]}</td>
                                                            <td className="px-6 py-3.5">
                                                                <span className={`inline-flex items-center text-xs font-medium px-2 py-0.5 rounded ${isCompra ? 'text-blue-400 bg-blue-400/10' : 'text-slate-300 bg-slate-400/10'}`}>
                                                                    {op.col_4}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-3.5"><span className="font-semibold text-slate-200">{op.col_3}</span></td>
                                                            <td className="px-6 py-3.5 text-right text-slate-300 number-font">{op.col_5}</td>
                                                            <td className="px-6 py-3.5 text-right text-slate-300 number-font">{op.col_6}</td>
                                                            <td className="px-6 py-3.5 text-right font-medium text-slate-200 number-font">{op.col_7}</td>
                                                        </tr>
                                                    );
                                                })}
                                                {operaciones.length === 0 && (
                                                    <tr><td colSpan="6" className="px-6 py-6 text-center text-slate-500 text-sm">Libro de órdenes vacío.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        )}

                        {/* ===================== TAB: EXPENSES ===================== */}
                        {activeTab === 'expenses' && (
                            <div className="space-y-8 animate-fade-in">
                                {gastosChartData.length > 0 && PieChart && (
                                    <div className="saas-card overflow-hidden p-6 flex flex-col items-center">
                                        <h2 className="text-base font-semibold text-slate-100 self-start mb-6 w-full border-b border-white/[0.04] pb-4">Desglose por Categoría</h2>
                                        <div className="w-full h-[300px]">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie
                                                        data={gastosChartData}
                                                        cx="50%"
                                                        cy="50%"
                                                        innerRadius={60}
                                                        outerRadius={100}
                                                        paddingAngle={5}
                                                        dataKey="value"
                                                    >
                                                        {gastosChartData.map((entry, index) => (
                                                            <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                                        ))}
                                                    </Pie>
                                                    <Tooltip 
                                                        formatter={(value) => formatCurrency(value)}
                                                        contentStyle={{ backgroundColor: '#0f182b', borderColor: 'rgba(255,255,255,0.1)', borderRadius: '8px', color: '#f8fafc' }}
                                                    />
                                                    <Legend wrapperStyle={{ fontSize: '13px', paddingTop: '10px' }}/>
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                )}

                                <div className="saas-card overflow-hidden">
                                    <div className="px-6 py-5 border-b border-white/[0.04]">
                                        <h2 className="text-base font-semibold text-slate-100">Transacciones y Consumos</h2>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left whitespace-nowrap">
                                            <thead className="bg-[#0b1220] border-b border-white/[0.04]">
                                                <tr>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Fecha</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Descripción</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Categorías</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider">Medio de Pago</th>
                                                    <th className="px-6 py-3 text-xs font-medium text-slate-400 uppercase tracking-wider text-right">Importe</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/[0.02]">
                                                {gastos.map((g, i) => (
                                                    <tr key={i} className="text-sm table-row-hover">
                                                        <td className="px-6 py-3.5 text-slate-400 text-xs">{g.Fecha}</td>
                                                        <td className="px-6 py-3.5 font-medium text-slate-200">{g.Descripción}</td>
                                                        <td className="px-6 py-3.5">
                                                            <div className="flex items-center space-x-1">
                                                                <span className="text-xs text-slate-400 bg-slate-800/60 px-2 py-0.5 rounded">{g.CategoriaGasto || 'Otros'}</span>
                                                                {g.Subcategoria && (
                                                                    <span className="text-xs text-slate-500">{g.Subcategoria}</span>
                                                                )}
                                                            </div>
                                                        </td>
                                                        <td className="px-6 py-3.5 text-slate-400 text-sm">
                                                            {g["Medio de pago"]}
                                                        </td>
                                                        <td className="px-6 py-3.5 text-right font-medium text-slate-100 number-font">
                                                            {formatCurrency(parseNumber(g.Gasto))}
                                                        </td>
                                                    </tr>
                                                ))}
                                                {gastos.length === 0 && (
                                                    <tr><td colSpan="5" className="px-6 py-6 text-center text-slate-500 text-sm">No hay consumos recientes.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );

        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(4px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.3s ease-out forwards;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
